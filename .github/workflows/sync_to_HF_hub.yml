name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1
          lfs: true
      - name: Push to hub
        env:
          HF: ${{ secrets.HF }}
        run: |
          git config --global user.name "Soumya Prabha Maiti"
          git config --global user.email "73134224+soumya-prabha-maiti@users.noreply.github.com"
          git checkout --orphan deploy
          git commit -m "Deploy to HF Spaces"
          git push --force https://soumyaprabhamaiti:$HF@huggingface.co/spaces/soumyaprabhamaiti/tomato-leaf-disease-classification deploy:main
